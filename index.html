<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learning Tasks Manager</title>

<!--
README

- Open this file in browser
- Data stored in localStorage
- Export JSON regularly for backup

-->

<style>
body { margin:0; font-family:Arial; background:#f5f7fa; }

/* TOP NAV */
.topnav {
  background:#222;
  color:white;
  padding:10px;
}
.topnav button {
  background:#444;
  color:white;
  border:none;
  margin-right:10px;
  padding:8px 12px;
  cursor:pointer;
}
.topnav button:hover { background:#666; }

/* LAYOUT */
.layout {
  display:flex;
  height:calc(100vh - 50px);
}

/* SIDEBAR */
.sidebar {
  width:220px;
  background:#111;
  color:white;
  padding:10px;
  overflow-y:auto;
}
.sidebar h3 { margin-top:0; }

.sidebar button {
  width:100%;
  margin:4px 0;
  background:#333;
}
.sidebar button.active {
  background:#008cba;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
  overflow:auto;
}

.card {
  background:white;
  padding:15px;
  border-radius:8px;
  margin-bottom:15px;
}

table {
  width:100%;
  border-collapse:collapse;
}
th, td {
  border:1px solid #ddd;
  padding:8px;
}
th { background:#eee; }

button {
  padding:5px 10px;
  margin:2px;
  background:#333;
  color:white;
  border:none;
  cursor:pointer;
}
button:hover { background:#555; }

input, select {
  padding:5px;
  margin:5px;
}

.hidden { display:none; }

.message {
  padding:10px;
  background:#dff0d8;
  margin-bottom:10px;
  border-radius:5px;
}
.error { background:#f2dede; }
</style>
</head>

<body>

<!-- TOP NAV -->
<div class="topnav">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('manage')">Manage</button>
<button onclick="showPage('importExport')">Import/Export</button>
<button onclick="undoLastAction()">Undo</button>
</div>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
<h3>Categories</h3>
<div id="categoryList"></div>
</div>

<!-- MAIN -->
<div class="main">

<div id="msg"></div>

<!-- HOME -->
<div id="homePage" class="card">
<h2>Home</h2>
<input type="date" id="homeDate">
<button onclick="loadHome()">Load</button>
<button onclick="exportDateCSV()">Export Date CSV</button>
<div id="homeResults"></div>
</div>

<!-- CATEGORY -->
<div id="categoryPage" class="hidden card">
<h2 id="categoryTitle"></h2>

<input type="date" id="catDate">
<input type="text" id="catTask" placeholder="Task">
<input type="text" id="catComment" placeholder="Comment">
<label><input type="checkbox" id="catDone"> Done</label>
<button onclick="addEntryUI()">Add</button>

<br>
<button onclick="markAllDone()">Mark All Done</button>
<button onclick="exportCategoryCSV()">Export CSV</button>

<div id="categoryTable"></div>
</div>

<!-- MANAGE -->
<div id="managePage" class="hidden card">
<h2>Manage Categories</h2>
<input type="text" id="newCategory" placeholder="New category">
<button onclick="addCategoryUI()">Add</button>
<div id="manageList"></div>
</div>

<!-- IMPORT EXPORT -->
<div id="importExportPage" class="hidden card">
<h2>Import / Export</h2>

<button onclick="exportJSON()">Export JSON</button>
<button onclick="exportAllCSV()">Export All CSV</button>

<br><br>

<input type="file" id="importFile">
<select id="importMode">
<option value="merge">Merge</option>
<option value="replace">Replace</option>
</select>
<button onclick="handleImport()">Import</button>

<div id="importPreview"></div>
</div>

</div>
</div>

<script>
/* CONFIG */
const STORAGE_KEY = "learningTasksData_v4";
const INIT_KEY = "learningTasksInitialized_v4";
const DEFAULT_CATEGORIES = ["Day2Day","TASKS","BASH SCRIPTING"];

/* STATE */
let data = { categories: [], entries: [] };
let currentCategory = null;
let undoState = null;

/* UTIL */
function uid() {
  return "id-" + Date.now() + "-" + Math.random().toString(16).slice(2);
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function load() {
  data = JSON.parse(localStorage.getItem(STORAGE_KEY));
}
function showMsg(text, err=false) {
  const el=document.getElementById("msg");
  el.innerHTML=`<div class="message ${err?'error':''}">${text}</div>`;
  setTimeout(()=>el.innerHTML="",3000);
}
function backup() {
  undoState = JSON.stringify(data);
}
function undoLastAction() {
  if (!undoState) return showMsg("Nothing to undo", true);
  data = JSON.parse(undoState);
  save();
  renderSidebar();
  loadHome();
  showMsg("Undo successful");
}

/* INIT */
function init() {
  if (!localStorage.getItem(INIT_KEY)) {
    data.categories = [...DEFAULT_CATEGORIES];
    const today = new Date().toISOString().slice(0,10);

    data.entries = [
      {id:uid(),category:"Day2Day",date:today,text:"Morning walk",comment:"health",done:false},
      {id:uid(),category:"TASKS",date:today,text:"Finish module",comment:"urgent",done:false},
      {id:uid(),category:"BASH SCRIPTING",date:today,text:"Practice loops",comment:"for exam",done:false}
    ];

    save();
    localStorage.setItem(INIT_KEY,true);
  } else {
    load();
  }

  document.getElementById("homeDate").value = new Date().toISOString().slice(0,10);

  renderSidebar();
  showPage('home');
  loadHome();
}

/* SIDEBAR */
function renderSidebar() {
  let html="";
  data.categories.forEach(c=>{
    html+=`<button onclick="openCategory('${c}')" class="${c===currentCategory?'active':''}">${c}</button>`;
  });
  document.getElementById("categoryList").innerHTML=html;
}

/* NAV */
function showPage(p) {
  document.querySelectorAll(".main > div").forEach(d=>d.classList.add("hidden"));
  document.getElementById(p+"Page").classList.remove("hidden");

  if (p==="manage") renderManage();
}

/* HOME */
function getEntriesByDate(date) {
  return data.entries.filter(e=>e.date===date);
}

function loadHome() {
  const date = document.getElementById("homeDate").value;
  const rows = getEntriesByDate(date);

  let html=`<p>Total: ${rows.length}</p>`;
  if (!rows.length) html+="<p>No tasks found</p>";

  html+=`<table>
<tr><th>Category</th><th>Date</th><th>Task</th><th>Comment</th><th>Done</th><th>Actions</th></tr>`;

  rows.forEach(e=>{
    html+=`<tr>
<td>${e.category}</td>
<td>${e.date}</td>
<td>${e.text}</td>
<td>${e.comment||""}</td>
<td><input type="checkbox" ${e.done?"checked":""} onclick="toggleDone('${e.id}')"></td>
<td>
<button onclick="editEntry('${e.id}')">Edit</button>
<button onclick="deleteEntry('${e.id}')">Delete</button>
</td>
</tr>`;
  });

  html+="</table>";
  document.getElementById("homeResults").innerHTML=html;
}

/* CATEGORY */
function openCategory(c) {
  currentCategory=c;
  renderSidebar();
  showPage('category');
  document.getElementById("categoryTitle").innerText=c;
  renderCategory();
}

function renderCategory() {
  const rows=data.entries.filter(e=>e.category===currentCategory);

  let html=`<table>
<tr><th>Date</th><th>Task</th><th>Comment</th><th>Done</th><th>Actions</th></tr>`;

  rows.forEach(e=>{
    html+=`<tr>
<td>${e.date}</td>
<td>${e.text}</td>
<td>${e.comment||""}</td>
<td><input type="checkbox" ${e.done?"checked":""} onclick="toggleDone('${e.id}')"></td>
<td>
<button onclick="editEntry('${e.id}')">Edit</button>
<button onclick="deleteEntry('${e.id}')">Delete</button>
</td>
</tr>`;
  });

  html+="</table>";
  document.getElementById("categoryTable").innerHTML=html;
}

function addEntryUI() {
  const d=document.getElementById("catDate").value;
  const t=document.getElementById("catTask").value.trim();
  const c=document.getElementById("catComment").value.trim();
  const done=document.getElementById("catDone").checked;

  if (!d || !t) return showMsg("Invalid input",true);

  data.entries.push({
    id:uid(),
    category:currentCategory,
    date:d,
    text:t,
    comment:c,
    done:done
  });

  save();
  renderCategory();
  showMsg("Added");
}

/* ENTRY */
function toggleDone(id) {
  const e=data.entries.find(x=>x.id===id);
  if (e) e.done=!e.done;
  save();
}

function deleteEntry(id) {
  if (!confirm("Delete entry?")) return;
  backup();
  data.entries=data.entries.filter(e=>e.id!==id);
  save();
  renderCategory();
  loadHome();
}

function editEntry(id) {
  const e=data.entries.find(x=>x.id===id);
  if (!e) return;

  const t=prompt("Task:",e.text);
  if (t===null) return;
  const c=prompt("Comment:",e.comment||"");

  e.text=t;
  e.comment=c;
  save();
  renderCategory();
  loadHome();
}

/* CATEGORY MGMT */
function addCategoryUI() {
  const name=document.getElementById("newCategory").value.trim();
  if (!name || data.categories.includes(name)) return showMsg("Invalid category",true);

  data.categories.push(name);
  save();
  renderSidebar();
  renderManage();
}

function renderManage() {
  let html="";
  data.categories.forEach(c=>{
    html+=`${c}
    <button onclick="renameCategory('${c}')">Rename</button>
    <button onclick="deleteCategory('${c}')">Delete</button><br>`;
  });
  document.getElementById("manageList").innerHTML=html;
}

function renameCategory(oldName) {
  const n=prompt("New name:",oldName);
  if (!n || data.categories.includes(n)) return;

  data.entries.forEach(e=>{
    if (e.category===oldName) e.category=n;
  });

  data.categories=data.categories.map(c=>c===oldName?n:c);
  save();
  renderSidebar();
  renderManage();
}

function deleteCategory(name) {
  if (!confirm("Delete category and entries?")) return;

  backup();
  data.entries=data.entries.filter(e=>e.category!==name);
  data.categories=data.categories.filter(c=>c!==name);

  save();
  renderSidebar();
  renderManage();
}

/* EXPORT */
function exportJSON() {
  const fileName="tasks-"+new Date().toISOString().slice(0,10)+".json";
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=fileName;
  a.click();
}

function exportCSV(rows, name) {
  let csv="Category,Date,Task,Comment,Done\n";
  rows.forEach(r=>{
    csv+=`${r.category},${r.date},"${r.text}","${r.comment}",${r.done}\n`;
  });
  const blob=new Blob([csv],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=name;
  a.click();
}

function exportAllCSV() {
  exportCSV(data.entries,"all.csv");
}
function exportCategoryCSV() {
  exportCSV(data.entries.filter(e=>e.category===currentCategory),currentCategory+".csv");
}
function exportDateCSV() {
  const d=document.getElementById("homeDate").value;
  exportCSV(getEntriesByDate(d),"date-"+d+".csv");
}

/* IMPORT */
function handleImport() {
  const file=document.getElementById("importFile").files[0];
  const mode=document.getElementById("importMode").value;
  if (!file) return;

  const reader=new FileReader();
  reader.onload=e=>{
    const imp=JSON.parse(e.target.result);

    document.getElementById("importPreview").innerText =
      `Categories: ${imp.categories.length}, Entries: ${imp.entries.length}`;

    if (!confirm("Proceed import?")) return;

    backup();

    if (mode==="replace") {
      data=imp;
    } else {
      imp.entries.forEach(ne=>{
        if (!data.entries.find(e=>e.id===ne.id)) data.entries.push(ne);
      });
      imp.categories.forEach(c=>{
        if (!data.categories.includes(c)) data.categories.push(c);
      });
    }

    save();
    renderSidebar();
    showMsg("Import done");
  };
  reader.readAsText(file);
}

/* BULK */
function markAllDone() {
  data.entries.forEach(e=>{
    if (e.category===currentCategory) e.done=true;
  });
  save();
  renderCategory();
}

/* START */
init();
</script>

</body>
</html>
