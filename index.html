<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learning Tasks Manager</title>

<style>
body { font-family: Arial; margin:0; background:#f5f7fa; }

nav { background:#222; color:white; padding:10px; }
nav a { color:white; margin-right:15px; cursor:pointer; font-weight:bold; }

.container { padding:20px; }

.card {
  background:white;
  padding:15px;
  border-radius:8px;
  margin-bottom:15px;
}

table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #ddd; padding:8px; }
th { background:#eee; }

button {
  padding:5px 10px;
  margin:2px;
  background:#333;
  color:white;
  border:none;
  cursor:pointer;
}
button:hover { background:#555; }

input { padding:5px; margin:5px; }

.hidden { display:none !important; }

.modal {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal.show { display:flex; }

.modal-content {
  background:white;
  padding:20px;
  border-radius:8px;
  width:300px;
}
</style>
</head>

<body>

<nav>
<a onclick="showPage('home')">Home</a>
<span id="categoryNav"></span>
<a onclick="showPage('manage')">Manage</a>
<a onclick="showPage('importExport')">Import/Export</a>

<br><br>

<!-- FILE BUTTONS -->
<button onclick="loadFile()">📂 Load File</button>
<button onclick="connectFile()">🔗 Connect File</button>
<button onclick="saveToFile()">💾 Save Now</button>
</nav>

<div class="container">

<!-- HOME -->
<div id="homePage" class="card">
<h2>Home</h2>
<input type="date" id="homeDate">
<button onclick="loadHome()">Load</button>
<div id="homeResults"></div>
</div>

<!-- CATEGORY -->
<div id="categoryPage" class="hidden card">
<h2 id="categoryTitle"></h2>

<input type="date" id="catDate">
<input type="text" id="catTask" placeholder="Task">
<input type="text" id="catComment" placeholder="Comment">
<label><input type="checkbox" id="catDone"> Done</label>

<button onclick="addEntryUI()">Add</button>

<div id="categoryTable"></div>
</div>

<!-- MANAGE -->
<div id="managePage" class="hidden card">
<h2>Manage Categories</h2>
<input type="text" id="newCategory" placeholder="New category">
<button onclick="addCategoryUI()">Add</button>
<div id="manageList"></div>
</div>

<!-- IMPORT EXPORT -->
<div id="importExportPage" class="hidden card">
<h2>Import / Export</h2>
<button onclick="exportJSON()">Export JSON</button>
</div>

</div>

<!-- MODAL -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <h3>Edit Entry</h3>
    <input type="date" id="editDate"><br>
    <input type="text" id="editTask"><br>
    <input type="text" id="editComment"><br>
    <label><input type="checkbox" id="editDone"> Done</label><br><br>
    <button onclick="saveEdit()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
const STORAGE_KEY = "learningTasksData";
const INIT_KEY = "learningTasksInitialized";
const DEFAULT_CATEGORIES = ["Day2Day","TASKS","BASH SCRIPTING"];

let data = { categories: [], entries: [] };
let currentCategory = null;
let editId = null;
let fileHandle = null;

/* INIT */
function init() {
  if (!localStorage.getItem(INIT_KEY)) {
    data.categories = [...DEFAULT_CATEGORIES];
    data.entries = [
      {id:uid(),category:"Day2Day",date:"2026-03-29",text:"Walk",comment:"Morning",done:false}
    ];
    save();
    localStorage.setItem(INIT_KEY,true);
  } else {
    data = JSON.parse(localStorage.getItem(STORAGE_KEY));
  }

  renderNav();
  showPage('home');
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  autoSaveFile();
}

function uid() {
  return "id-"+Date.now()+Math.random();
}

/* NAV */
function renderNav() {
  let html="Categories: ";
  data.categories.forEach(c=>{
    html+=`<a onclick="openCategory('${c}')">${c}</a>`;
  });
  document.getElementById("categoryNav").innerHTML=html;
}

function showPage(p) {
  document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));
  document.getElementById(p+"Page").classList.remove("hidden");
  if (p==="manage") renderManage();
}

/* HOME */
function loadHome() {
  const date = homeDate.value;
  const rows = data.entries.filter(e=>e.date===date);

  let html = `<table>
<tr><th>Category</th><th>Date</th><th>Task</th><th>Comment</th><th>Done</th><th>Actions</th></tr>`;

  rows.forEach(e=>{
    html+=`<tr>
<td>${e.category}</td>
<td>${e.date}</td>
<td>${e.text}</td>
<td>${e.comment||""}</td>
<td><input type="checkbox" ${e.done?"checked":""} onclick="toggleDone('${e.id}')"></td>
<td>
<button onclick="openEdit('${e.id}')">Edit</button>
<button onclick="deleteEntry('${e.id}')">Delete</button>
</td>
</tr>`;
  });

  html+="</table>";
  homeResults.innerHTML=html;
}

/* CATEGORY */
function openCategory(c) {
  currentCategory=c;
  showPage('category');
  categoryTitle.innerText=c;
  renderCategory();
}

function renderCategory() {
  const rows=data.entries.filter(e=>e.category===currentCategory);

  let html=`<table>
<tr><th>Date</th><th>Task</th><th>Comment</th><th>Done</th><th>Actions</th></tr>`;

  rows.forEach(e=>{
    html+=`<tr>
<td>${e.date}</td>
<td>${e.text}</td>
<td>${e.comment||""}</td>
<td><input type="checkbox" ${e.done?"checked":""} onclick="toggleDone('${e.id}')"></td>
<td>
<button onclick="openEdit('${e.id}')">Edit</button>
<button onclick="deleteEntry('${e.id}')">Delete</button>
</td>
</tr>`;
  });

  html+="</table>";
  categoryTable.innerHTML=html;
}

function addEntryUI() {
  if (!catDate.value || !catTask.value) return alert("Invalid input");

  data.entries.push({
    id:uid(),
    category:currentCategory,
    date:catDate.value,
    text:catTask.value,
    comment:catComment.value,
    done:catDone.checked
  });

  save();
  renderCategory();
}

/* EDIT */
function openEdit(id) {
  const e=data.entries.find(x=>x.id===id);
  editId=id;
  editDate.value=e.date;
  editTask.value=e.text;
  editComment.value=e.comment;
  editDone.checked=e.done;
  editModal.classList.add("show");
}

function closeModal() {
  editModal.classList.remove("show");
}

function saveEdit() {
  const e=data.entries.find(x=>x.id===editId);
  e.date=editDate.value;
  e.text=editTask.value;
  e.comment=editComment.value;
  e.done=editDone.checked;
  save();
  closeModal();
  renderCategory();
  loadHome();
}

/* ENTRY */
function deleteEntry(id) {
  data.entries=data.entries.filter(e=>e.id!==id);
  save();
  renderCategory();
  loadHome();
}

function toggleDone(id) {
  const e=data.entries.find(x=>x.id===id);
  if(e) e.done=!e.done;
  save();
}

/* MANAGE */
function addCategoryUI() {
  if (!newCategory.value) return;
  data.categories.push(newCategory.value);
  save();
  renderNav();
  renderManage();
}

function renderManage() {
  let html="";
  data.categories.forEach(c=>{
    html+=`${c}<br>`;
  });
  manageList.innerHTML=html;
}

/* FILE SYSTEM (SAFE) */

function isFileSupported() {
  return 'showOpenFilePicker' in window;
}

async function loadFile() {
  if (!isFileSupported()) return alert("Not supported in this browser");
  const [handle] = await window.showOpenFilePicker();
  fileHandle = handle;
  const file = await handle.getFile();
  const text = await file.text();
  data = JSON.parse(text);
  save();
  renderNav();
}

async function connectFile() {
  if (!isFileSupported()) return alert("Not supported in this browser");
  fileHandle = await window.showSaveFilePicker({
    suggestedName:"tasks.json"
  });
  alert("File connected");
}

async function saveToFile() {
  if (!fileHandle) return alert("No file connected");
  const writable = await fileHandle.createWritable();
  await writable.write(JSON.stringify(data,null,2));
  await writable.close();
  alert("Saved");
}

async function autoSaveFile() {
  if (!fileHandle) return;
  try {
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(data,null,2));
    await writable.close();
  } catch(e){}
}

/* EXPORT */
function exportJSON() {
  const blob=new Blob([JSON.stringify(data)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="tasks.json";
  a.click();
}

/* START */
init();
</script>

</body>
</html>
