<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learning Tasks Manager</title>

<!--
README

HOW TO USE:

1. Open this file in any browser.
2. Data is stored in your browser (localStorage).
3. ALWAYS export JSON to backup your data.

NAVIGATION:
- Home: Select date → view all tasks across categories
- Categories: Manage tasks per category
- Manage Categories: Add / rename / delete categories
- Import/Export:
   - Export JSON → full backup
   - Import JSON → Merge or Replace
   - Export CSV → all data

IMPORTANT:
- Deleting categories removes their entries
- You can Undo last destructive action
- Dates must be YYYY-MM-DD

-->

<style>
body { font-family: Arial; margin:0; background:#f5f7fa; }
nav { background:#222; color:white; padding:10px; }
nav a { color:white; margin-right:15px; cursor:pointer; font-weight:bold; }

.container { padding:20px; }

.card {
  background:white;
  padding:15px;
  border-radius:8px;
  margin-bottom:15px;
}

table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #ddd; padding:8px; }
th { background:#eee; }

button {
  padding:5px 10px;
  margin:2px;
  background:#333;
  color:white;
  border:none;
  cursor:pointer;
}
button:hover { background:#555; }

input, select { padding:5px; margin:5px; }

.hidden { display:none !important; }

.message {
  padding:10px;
  background:#dff0d8;
  margin-bottom:10px;
  border-radius:5px;
}
.error { background:#f2dede; }
</style>
</head>

<body>

<nav>
<a onclick="showPage('home')">Home</a>
<span id="categoryNav"></span>
<a onclick="showPage('manage')">Manage</a>
<a onclick="showPage('importExport')">Import/Export</a>
<button onclick="undoLastAction()">Undo</button>
</nav>

<div class="container">

<div id="msg"></div>

<!-- HOME -->
<div id="homePage" class="card">
<h2>Home</h2>
<input type="date" id="homeDate">
<button onclick="loadHome()">Load</button>
<button onclick="exportDateCSV()">Export Date CSV</button>
<div id="homeResults"></div>
</div>

<!-- CATEGORY -->
<div id="categoryPage" class="hidden card">
<h2 id="categoryTitle"></h2>

<input type="date" id="catDate">
<input type="text" id="catTask" placeholder="Task">
<label><input type="checkbox" id="catDone"> Done</label>
<button onclick="addEntryUI()">Add</button>

<br>
<button onclick="markAllDone()">Mark All Done</button>
<button onclick="exportCategoryCSV()">Export CSV</button>

<div id="categoryTable"></div>
</div>

<!-- MANAGE -->
<div id="managePage" class="hidden card">
<h2>Manage Categories</h2>
<input type="text" id="newCategory" placeholder="New category">
<button onclick="addCategoryUI()">Add</button>
<div id="manageList"></div>
</div>

<!-- IMPORT EXPORT -->
<div id="importExportPage" class="hidden card">
<h2>Import / Export</h2>

<button onclick="exportJSON()">Export JSON</button>
<button onclick="exportAllCSV()">Export All CSV</button>

<br><br>

<input type="file" id="importFile">
<select id="importMode">
<option value="merge">Merge</option>
<option value="replace">Replace</option>
</select>
<button onclick="handleImport()">Import</button>

<div id="importPreview"></div>
</div>

</div>

<script>
/* ================= CONFIG ================= */
const STORAGE_KEY = "learningTasksData_v2";
const INIT_KEY = "learningTasksInitialized_v2";
const DEFAULT_CATEGORIES = ["Day2Day","TASKS","BASH SCRIPTING"];

/* ================= STATE ================= */
let data = { categories: [], entries: [] };
let currentCategory = null;
let undoState = null;

/* ================= UTIL ================= */
function uid() {
  return "id-" + Date.now() + "-" + Math.random().toString(16).slice(2);
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function load() {
  data = JSON.parse(localStorage.getItem(STORAGE_KEY));
}

function showMsg(text, isError=false) {
  const el = document.getElementById("msg");
  el.innerHTML = `<div class="message ${isError?'error':''}">${text}</div>`;
  setTimeout(()=>el.innerHTML="",3000);
}

function backup() {
  undoState = JSON.stringify(data);
}

function undoLastAction() {
  if (!undoState) return showMsg("Nothing to undo", true);
  data = JSON.parse(undoState);
  save();
  renderNav();
  loadHome();
  showMsg("Undo successful");
}

/* ================= INIT ================= */
function init() {
  if (!localStorage.getItem(INIT_KEY)) {
    data.categories = [...DEFAULT_CATEGORIES];
    const today = new Date().toISOString().slice(0,10);

    data.entries = [
      {id:uid(),category:"Day2Day",date:today,text:"Morning walk",done:false},
      {id:uid(),category:"TASKS",date:today,text:"Finish project module",done:false},
      {id:uid(),category:"BASH SCRIPTING",date:today,text:"Practice loops",done:false}
    ];

    save();
    localStorage.setItem(INIT_KEY,true);
  } else {
    load();
  }

  document.getElementById("homeDate").value = new Date().toISOString().slice(0,10);

  renderNav();
  showPage('home');
  loadHome();
}

/* ================= NAV ================= */
function renderNav() {
  let html="Categories: ";
  data.categories.forEach(c=>{
    html+=`<a onclick="openCategory('${c}')">${c}</a>`;
  });
  document.getElementById("categoryNav").innerHTML=html;
}

function showPage(p) {
  document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));
  document.getElementById(p+"Page").classList.remove("hidden");

  if (p==="manage") renderManage();
}

/* ================= HOME ================= */
function getEntriesByDate(date) {
  return data.entries.filter(e=>e.date===date);
}

function loadHome() {
  const date = document.getElementById("homeDate").value;
  const rows = getEntriesByDate(date);

  let html = `<p>Total: ${rows.length}</p>`;
  if (!rows.length) html += "<p>No tasks found</p>";

  html += `<table>
<tr><th>Category</th><th>Date</th><th>Task</th><th>Done</th><th>Actions</th></tr>`;

  rows.forEach(e=>{
    html+=`<tr>
<td>${e.category}</td>
<td>${e.date}</td>
<td>${e.text}</td>
<td><input type="checkbox" ${e.done?"checked":""} onclick="toggleDone('${e.id}')"></td>
<td>
<button onclick="editEntryPrompt('${e.id}')">Edit</button>
<button onclick="deleteEntry('${e.id}')">Delete</button>
</td>
</tr>`;
  });

  html+="</table>";
  document.getElementById("homeResults").innerHTML=html;
}

/* ================= CATEGORY ================= */
function openCategory(c) {
  currentCategory=c;
  showPage('category');
  document.getElementById("categoryTitle").innerText=c;
  renderCategory();
}

function renderCategory() {
  const rows=data.entries.filter(e=>e.category===currentCategory);

  let html=`<table>
<tr><th>Date</th><th>Task</th><th>Done</th><th>Actions</th></tr>`;

  rows.forEach(e=>{
    html+=`<tr>
<td>${e.date}</td>
<td>${e.text}</td>
<td><input type="checkbox" ${e.done?"checked":""} onclick="toggleDone('${e.id}')"></td>
<td>
<button onclick="editEntryPrompt('${e.id}')">Edit</button>
<button onclick="deleteEntry('${e.id}')">Delete</button>
</td>
</tr>`;
  });

  html+="</table>";
  document.getElementById("categoryTable").innerHTML=html;
}

function addEntryUI() {
  const d = document.getElementById("catDate").value;
  const t = document.getElementById("catTask").value.trim();
  const done = document.getElementById("catDone").checked;

  if (!d || !t) return showMsg("Invalid input", true);

  data.entries.push({
    id:uid(),
    category:currentCategory,
    date:d,
    text:t,
    done:done
  });

  save();
  renderCategory();
  showMsg("Entry added");
}

/* ================= ENTRY ================= */
function toggleDone(id) {
  const e=data.entries.find(x=>x.id===id);
  if (e) e.done=!e.done;
  save();
}

function deleteEntry(id) {
  if (!confirm("Delete entry?")) return;
  backup();
  data.entries=data.entries.filter(e=>e.id!==id);
  save();
  renderCategory();
  loadHome();
}

function editEntryPrompt(id) {
  const e=data.entries.find(x=>x.id===id);
  if (!e) return;

  const newText = prompt("Edit task:", e.text);
  if (!newText) return;

  e.text=newText;
  save();
  renderCategory();
  loadHome();
}

/* ================= CATEGORY MGMT ================= */
function addCategoryUI() {
  const name = document.getElementById("newCategory").value.trim();
  if (!name || data.categories.includes(name)) return showMsg("Invalid category", true);

  data.categories.push(name);
  save();
  renderNav();
  renderManage();
}

function renderManage() {
  let html="";
  data.categories.forEach(c=>{
    html+=`${c}
    <button onclick="renameCategory('${c}')">Rename</button>
    <button onclick="deleteCategory('${c}')">Delete</button><br>`;
  });
  document.getElementById("manageList").innerHTML=html;
}

function renameCategory(oldName) {
  const newName = prompt("New name:", oldName);
  if (!newName) return;

  data.entries.forEach(e=>{
    if (e.category===oldName) e.category=newName;
  });

  data.categories = data.categories.map(c=>c===oldName?newName:c);

  save();
  renderNav();
  renderManage();
}

function deleteCategory(name) {
  if (!confirm("Delete category and entries?")) return;

  backup();
  data.entries = data.entries.filter(e=>e.category!==name);
  data.categories = data.categories.filter(c=>c!==name);

  save();
  renderNav();
  renderManage();
}

/* ================= EXPORT ================= */
function exportJSON() {
  const fileName = "tasks-backup-"+new Date().toISOString().slice(0,10)+".json";
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=fileName;
  a.click();
}

function exportCSV(rows, filename) {
  let csv = "Category,Date,Task,Done\n";
  rows.forEach(r=>{
    csv+=`${r.category},${r.date},"${r.text}",${r.done}\n`;
  });

  const blob=new Blob([csv],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
}

function exportAllCSV() {
  exportCSV(data.entries,"all-tasks.csv");
}

function exportCategoryCSV() {
  const rows=data.entries.filter(e=>e.category===currentCategory);
  exportCSV(rows, currentCategory+".csv");
}

function exportDateCSV() {
  const date=document.getElementById("homeDate").value;
  const rows=getEntriesByDate(date);
  exportCSV(rows,"tasks-"+date+".csv");
}

/* ================= IMPORT ================= */
function handleImport() {
  const file=document.getElementById("importFile").files[0];
  const mode=document.getElementById("importMode").value;
  if (!file) return;

  const reader=new FileReader();
  reader.onload=e=>{
    const imported=JSON.parse(e.target.result);

    document.getElementById("importPreview").innerText =
      `Categories: ${imported.categories.length}, Entries: ${imported.entries.length}`;

    if (!confirm("Proceed with import?")) return;

    backup();

    if (mode==="replace") {
      data=imported;
    } else {
      imported.entries.forEach(ne=>{
        if (!data.entries.find(e=>e.id===ne.id)) {
          data.entries.push(ne);
        }
      });

      imported.categories.forEach(c=>{
        if (!data.categories.includes(c)) data.categories.push(c);
      });
    }

    save();
    renderNav();
    showMsg("Import successful");
  };
  reader.readAsText(file);
}

/* ================= BULK ================= */
function markAllDone() {
  data.entries.forEach(e=>{
    if (e.category===currentCategory) e.done=true;
  });
  save();
  renderCategory();
}

/* ================= START ================= */
init();
</script>

</body>
</html>
