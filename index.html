<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learning Tasks Manager</title>

<style>
body { font-family: Arial; margin:0; background:#f5f7fa; }

nav {
  background:#222;
  color:white;
  padding:10px;
}
nav a {
  color:white;
  margin-right:15px;
  cursor:pointer;
  font-weight:bold;
}

.container { padding:20px; }

.card {
  background:white;
  padding:15px;
  border-radius:8px;
  margin-bottom:15px;
}

table {
  width:100%;
  border-collapse:collapse;
}
th, td {
  border:1px solid #ddd;
  padding:8px;
}
th { background:#eee; }

button {
  padding:5px 10px;
  margin:2px;
  background:#333;
  color:white;
  border:none;
  cursor:pointer;
}
button:hover { background:#555; }

input { padding:5px; margin:5px; }

.hidden { display:none !important; }

/* MODAL FIX */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal.show { display:flex; }

.modal-content {
  background:white;
  padding:20px;
  border-radius:8px;
  width:300px;
}
</style>
</head>

<body>

<nav>
<a onclick="showPage('home')">Home</a>
<span id="categoryNav"></span>
<a onclick="showPage('manage')">Manage</a>
<a onclick="showPage('importExport')">Import/Export</a>
</nav>

<div class="container">

<!-- HOME -->
<div id="homePage" class="card">
<h2>Home</h2>
<input type="date" id="homeDate">
<button onclick="loadHome()">Load</button>
<div id="homeResults"></div>
</div>

<!-- CATEGORY -->
<div id="categoryPage" class="hidden card">
<h2 id="categoryTitle"></h2>

<input type="date" id="catDate">
<input type="text" id="catTask" placeholder="Task">
<input type="text" id="catComment" placeholder="Comment">
<label><input type="checkbox" id="catDone"> Done</label>

<button onclick="addEntryUI()">Add</button>

<div id="categoryTable"></div>
</div>

<!-- MANAGE -->
<div id="managePage" class="hidden card">
<h2>Manage Categories</h2>
<input type="text" id="newCategory" placeholder="New category">
<button onclick="addCategoryUI()">Add</button>
<div id="manageList"></div>
</div>

<!-- IMPORT EXPORT -->
<div id="importExportPage" class="hidden card">
<h2>Import / Export</h2>
<button onclick="exportJSON()">Export JSON</button>
<br><br>
<input type="file" id="importFile">
<select id="importMode">
<option value="merge">Merge</option>
<option value="replace">Replace</option>
</select>
<button onclick="handleImport()">Import</button>
</div>

</div>

<!-- MODAL -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <h3>Edit Entry</h3>
    <input type="date" id="editDate"><br>
    <input type="text" id="editTask"><br>
    <input type="text" id="editComment"><br>
    <label><input type="checkbox" id="editDone"> Done</label><br><br>
    <button onclick="saveEdit()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
const STORAGE_KEY = "learningTasksData";
const INIT_KEY = "learningTasksInitialized";
const DEFAULT_CATEGORIES = ["Day2Day","TASKS","BASH SCRIPTING"];

let data = { categories: [], entries: [] };
let currentCategory = null;
let editId = null;

/* DOM */
const editModal = document.getElementById("editModal");
const editDate = document.getElementById("editDate");
const editTask = document.getElementById("editTask");
const editComment = document.getElementById("editComment");
const editDone = document.getElementById("editDone");

/* INIT */
function init() {
  if (!localStorage.getItem(INIT_KEY)) {
    data.categories = [...DEFAULT_CATEGORIES];
    data.entries = [
      {id:uid(),category:"Day2Day",date:"2026-03-29",text:"Walk",comment:"Morning",done:false},
      {id:uid(),category:"TASKS",date:"2026-03-29",text:"Project",comment:"Finish module",done:false},
      {id:uid(),category:"BASH SCRIPTING",date:"2026-03-29",text:"Loops",comment:"Practice",done:false}
    ];
    save();
    localStorage.setItem(INIT_KEY,true);
  } else {
    data = JSON.parse(localStorage.getItem(STORAGE_KEY));
  }

  renderNav();
  showPage('home');
}

/* UTIL */
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function uid() {
  return "id-"+Date.now()+Math.random();
}

/* NAV */
function renderNav() {
  let html="Categories: ";
  data.categories.forEach(c=>{
    html+=`<a onclick="openCategory('${c}')">${c}</a>`;
  });
  document.getElementById("categoryNav").innerHTML=html;
}

function showPage(p) {
  document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));
  document.getElementById(p+"Page").classList.remove("hidden");

  if (p === "manage") renderManage(); // FIX
}

/* HOME */
function loadHome() {
  const date = document.getElementById("homeDate").value;
  const rows = data.entries.filter(e=>e.date===date);

  let html = `<p>Total: ${rows.length}</p>`;
  if (!rows.length) html += "No tasks found";

  html += `<table>
<tr><th>Category</th><th>Date</th><th>Task</th><th>Comment</th><th>Done</th><th>Actions</th></tr>`;

  rows.forEach(e=>{
    html+=`<tr>
<td>${e.category}</td>
<td>${e.date}</td>
<td>${e.text}</td>
<td>${e.comment||""}</td>
<td><input type="checkbox" ${e.done?"checked":""} onclick="toggleDone('${e.id}')"></td>
<td>
<button onclick="openEdit('${e.id}')">Edit</button>
<button onclick="deleteEntry('${e.id}')">Delete</button>
</td>
</tr>`;
  });

  html+="</table>";
  document.getElementById("homeResults").innerHTML=html;
}

/* CATEGORY */
function openCategory(c) {
  currentCategory=c;
  showPage('category');
  document.getElementById("categoryTitle").innerText=c;
  renderCategory();
}

function renderCategory() {
  const rows=data.entries.filter(e=>e.category===currentCategory);

  let html=`<table>
<tr><th>Date</th><th>Task</th><th>Comment</th><th>Done</th><th>Actions</th></tr>`;

  rows.forEach(e=>{
    html+=`<tr>
<td>${e.date}</td>
<td>${e.text}</td>
<td>${e.comment||""}</td>
<td><input type="checkbox" ${e.done?"checked":""} onclick="toggleDone('${e.id}')"></td>
<td>
<button onclick="openEdit('${e.id}')">Edit</button>
<button onclick="deleteEntry('${e.id}')">Delete</button>
</td>
</tr>`;
  });

  html+="</table>";
  document.getElementById("categoryTable").innerHTML=html;
}

function addEntryUI() {
  const d = document.getElementById("catDate").value;
  const t = document.getElementById("catTask").value;
  const c = document.getElementById("catComment").value;
  const done = document.getElementById("catDone").checked;

  if (!d || !t) return alert("Invalid input");

  data.entries.push({
    id:uid(),
    category:currentCategory,
    date:d,
    text:t,
    comment:c,
    done:done
  });

  save();
  renderCategory();
}

/* EDIT */
function openEdit(id) {
  const e=data.entries.find(x=>x.id===id);
  if (!e) return;

  editId=id;
  editDate.value=e.date;
  editTask.value=e.text;
  editComment.value=e.comment||"";
  editDone.checked=e.done;

  editModal.classList.add("show");
}

function closeModal() {
  editModal.classList.remove("show");
}

function saveEdit() {
  const e=data.entries.find(x=>x.id===editId);
  if (!e) return;

  e.date=editDate.value;
  e.text=editTask.value;
  e.comment=editComment.value;
  e.done=editDone.checked;

  save();
  closeModal();

  renderCategory();
  loadHome();
}

/* ENTRY */
function deleteEntry(id) {
  if (!confirm("Delete entry?")) return;
  data.entries=data.entries.filter(e=>e.id!==id);
  save();
  renderCategory();
  loadHome();
}

function toggleDone(id) {
  const e=data.entries.find(x=>x.id===id);
  if (e) e.done=!e.done;
  save();
}

/* CATEGORY MGMT */
function addCategoryUI() {
  const name = document.getElementById("newCategory").value;
  if (!name) return;

  data.categories.push(name);
  save();
  renderNav();
  renderManage();
}

function renderManage() {
  let html="";
  data.categories.forEach(c=>{
    html+=`${c}
    <button onclick="renameCategory('${c}')">Rename</button>
    <button onclick="deleteCategory('${c}')">Delete</button><br>`;
  });
  document.getElementById("manageList").innerHTML=html;
}

function renameCategory(oldName) {
  const newName = prompt("New name:", oldName);
  if (!newName) return;

  data.entries.forEach(e=>{
    if (e.category===oldName) e.category=newName;
  });

  data.categories = data.categories.map(c=>c===oldName?newName:c);

  save();
  renderNav();
  renderManage();
}

function deleteCategory(name) {
  if (!confirm("Delete category and entries?")) return;

  data.entries = data.entries.filter(e=>e.category!==name);
  data.categories = data.categories.filter(c=>c!==name);

  save();
  renderNav();
  renderManage();
}

/* EXPORT */
function exportJSON() {
  const blob=new Blob([JSON.stringify(data)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="tasks.json";
  a.click();
}

function handleImport() {
  const file=document.getElementById("importFile").files[0];
  const reader=new FileReader();
  reader.onload=e=>{
    data=JSON.parse(e.target.result);
    save();
    renderNav();
  };
  reader.readAsText(file);
}

/* START */
init();
</script>

</body>
</html>
