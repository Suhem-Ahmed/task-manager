version: '3.8'

services:
  tasks-manager:
    build: .
    container_name: tasks-manager
    restart: unless-stopped
    ports:
      - "7777:3000"
    volumes:
      - tasks-manager-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  tasks-manager-data:
