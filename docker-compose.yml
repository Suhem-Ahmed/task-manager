version: '3.8'

services:
  tasks-manager:
    build: .
    image: tasks-manager
    container_name: tasks-manager
    restart: unless-stopped
    # NO ports exposed to host - only nginx can access it
    expose:
      - "3000"
    volumes:
      - tasks-manager-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  nginx-proxy:
    image: nginx:alpine
    container_name: tasks-manager-nginx
    restart: unless-stopped
    ports:
      - "7778:80"  # External access through this port
    volumes:
      - ./task.conf:/etc/nginx/conf.d/default.conf:ro
      - ./task.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - tasks-manager
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  tasks-manager-data:
